name: "EKS Bootstrap (Helm + Addons)"

on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        options: [dev, stage, prod]
        required: true

      action:
        type: choice
        options: [plan, apply, destroy]
        required: true
        default: plan

permissions:
  id-token: write
  contents: read

jobs:
  eks:
    runs-on: [self-hosted, eks]

    defaults:
      run:
        working-directory: eks

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActionsEKSDeployRole
          role-session-name: github-actions
          aws-region: us-east-1

      - name: verify AWS Credentials
        run: aws sts get-caller-identity

      - name: Terraform Init
        run: terraform init -upgrade

      - name: Terraform Workspace
        run: |
          terraform workspace select ${{ github.event.inputs.environment }} || \
          terraform workspace new ${{ github.event.inputs.environment }}

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        if: ${{ github.event.inputs.action != 'apply' }}
        run: |
          terraform plan \
          -var-file="../${{ github.event.inputs.environment }}/${{ github.event.inputs.environment }}.tfvars"

      - name: Terraform Apply
        if: ${{ github.event.inputs.action == 'apply' }}
        run: |
          terraform apply -auto-approve \
          -var-file="../${{ github.event.inputs.environment }}/${{ github.event.inputs.environment }}.tfvars"

      - name: Terraform Destroy Plan
        if: ${{ github.event.inputs.action == 'destroy' }}
        run: |
          terraform plan -destroy \
          -var-file="../${{ github.event.inputs.environment }}/${{ github.event.inputs.environment }}.tfvars"

      - name: Terraform Destroy
        if: ${{ github.event.inputs.action == 'destroy' }}
        run: |
          terraform destroy -auto-approve \
          -var-file="../${{ github.event.inputs.environment }}/${{ github.event.inputs.environment }}.tfvars"
